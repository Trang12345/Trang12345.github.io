<!DOCTYPE html>
<html lang="en">
  <head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-87892606-1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'UA-87892606-1');
    </script>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Hilton Hart</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.9.0/css/bulma.min.css">
    <script defer src="https://use.fontawesome.com/releases/v5.14.0/js/all.js"></script>
  </head>
  <body>

    <section class="hero is-black">
      <div class="hero-body">
        <div class="container">
          <div class="columns">
            <div class="column is-one-quarter">
              <figure class="image">
                <img src="hilton-hart.jpg" alt="Photo of Hilton Hart"></img>
              </figure>
              <br>
              <h1 class="title has-text-centered has-text-left-desktop">
                Hilton Hart
              </h1>
              <h2 class="subtitle has-text-centered has-text-left-desktop">
                Austin, Texas
              </h2>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="columns">
          <div class="column is-half">

            <div class="box">
              <article class="media">
                <div class="media-left">
                  <span class="icon is-medium">
                    <i class="fas fa-2x fa-briefcase"></i>
                  </span>
                </div>
                <div class="media-content">
                  <div class="content">
                    <a href="https://www.edisonlf.com"
                       target="_blank"
                       rel="noopener">
                      CEO @ edisonlf.com
                    </a>
                  </div>
                </div>
              </article>
            </div>

            <div class="box">
              <article class="media">
                <div class="media-left">
                  <span class="icon is-medium">
                    <i class="fab fa-2x fa-linkedin"></i>
                  </span>
                </div>
                <div class="media-content">
                  <div class="content">
                    <a href="https://www.linkedin.com/in/hiltonhart" target="_blank" rel="noopener">
                      linkedin.com/in/HiltonHart
                    </a>
                  </div>
                </div>
              </article>
            </div>

            <div class="box">
              <article class="media">
                <div class="media-left">
                  <span class="icon is-medium">
                    <i class="fab fa-2x fa-twitter"></i>
                  </span>
                </div>
                <div class="media-content">
                  <div class="content">
                    <a href="https://twitter.com/HiltonHart"
                       target="_blank"
                       rel="noopener">
                      twitter.com/HiltonHart
                    </a>
                  </div>
                </div>
              </article>
            </div>

            <div class="box">
              <article class="media">
                <div class="media-left">
                  <span class="icon is-medium">
                    <i class="fab fa-2x fa-instagram-square"></i>
                  </span>
                </div>
                <div class="media-content">
                  <div class="content">
                    <a href="https://www.instagram.com/hilton.hart"
                       target="_blank"
                       rel="noopener">
                      instagram.com/hilton.hart
                    </a>
                  </div>
                </div>
              </article>
            </div>

          </div>
        </div>
      </div>
    </section>

  </body>
</html>
